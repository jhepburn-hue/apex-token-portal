<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Token...</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); text-align: center; max-width: 450px; width: 100%; border: 1px solid #334155; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 48px; height: 48px; border-radius: 50%; border-left-color: #22c55e; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
        h2 { margin: 0; font-weight: 600; }
        p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="loader">
            <div class="spinner"></div>
            <h2>Generating Token...</h2>
            <p id="status-text">Initializing build process...</p>
        </div>
    </div>

    <script>
        const taskName = "{{ filename_stem }}";
        
        function checkStatus() {
            fetch(`/status/${taskName.toUpperCase()}`)
                .then(res => res.json())
                .then(data => {
                    if (data.state) {
                        document.getElementById('status-text').innerText = `Status: ${data.state}...`;
                    }
                    if (data.state === 'completed') {
                        window.location.href = "/token_display_view?token=" + encodeURIComponent(data.token) + "&cached=false";
                    } else if (data.state === 'failed') {
                        document.getElementById('status-text').innerText = "Failed: " + (data.error || "Unknown error");
                    } else {
                        setTimeout(checkStatus, 3000);
                    }
                })
                .catch(() => setTimeout(checkStatus, 3000));
        }
        
        window.onload = function() {
            setTimeout(checkStatus, 2000);
        };
    </script>
</body>
</html>
