<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Tokens...</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); text-align: center; max-width: 450px; width: 100%; border: 1px solid #334155; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 48px; height: 48px; border-radius: 50%; border-left-color: #22c55e; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
        h2 { margin: 0; font-weight: 600; }
        p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="loader">
            <div class="spinner"></div>
            <h2>Generating Tokens...</h2>
            <p id="status-text">Initializing build process...</p>
        </div>
    </div>

    <script>
    const isBatch = {{ is_batch | tojson if is_batch is defined else false }};
    let queryKey = "";

    if (isBatch) {
        const stemsList = {{ batch_stems | tojson if batch_stems is defined else [] }};
        queryKey = stemsList.join(",");
    } else {
        queryKey = "{{ filename_stem if filename_stem is defined else '' }}";
    }

    // Client-side hard timeout settings (4 minutes = 240,000 ms)
    const MAX_WAIT_TIME_MS = 240000; 
    const startTime = Date.now();
    let pollTimer = null;

    function showErrorUI(errorMessage) {
        // Stop the CSS spinner
        const spinner = document.querySelector('.spinner');
        if (spinner) spinner.style.display = 'none';

        // Update card contents with error styling
        document.querySelector('h2').innerText = "Generation Error";
        document.querySelector('h2').style.color = "#f87171"; // Red text

        const statusText = document.getElementById('status-text');
        statusText.style.color = "#fca5a5";
        statusText.innerText = errorMessage;

        // Add a back button so the user isn't stuck
        const card = document.querySelector('.card');
        if (!document.getElementById('retry-btn')) {
            const btn = document.createElement('a');
            btn.id = 'retry-btn';
            btn.href = "/";
            btn.className = "btn primary";
            btn.style.cssText = "display: inline-block; margin-top: 1.5rem; padding: 0.5rem 1rem; background: #3b82f6; color: white; text-decoration: none; border-radius: 6px;";
            btn.innerText = "← Try Again";
            card.appendChild(btn);
        }
    }

    function checkStatus() {
        if (!queryKey) return;

        if (Date.now() - startTime > MAX_WAIT_TIME_MS) {
            showErrorUI("Build timed out after 4 minutes. Please check Forge or PocketBase logs and try again.");
            return;
        }

        fetch(`/status/${encodeURIComponent(queryKey)}`)
            .then(res => {
                if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
                return res.json();
            })
            .then(data => {
                if (data.state) {
                    document.getElementById('status-text').innerText = `Status: ${data.state}...`;
                }

                if (data.state === 'completed') {
                    if (isBatch) {
                        window.location.href = "/token_display_view?stems=" + encodeURIComponent(queryKey);
                    } else {
                        window.location.href = "/token_display_view?token=" + encodeURIComponent(data.token) + "&cached=false";
                    }
                } else if (data.state === 'failed') {
                    showErrorUI(data.error || "An unknown error occurred during build processing.");
                } else {
                    pollTimer = setTimeout(checkStatus, 3000);
                }
            })
            .catch(err => {
                console.error("Polling error:", err);
                pollTimer = setTimeout(checkStatus, 3000);
            });
    }

    window.onload = function() {
        pollTimer = setTimeout(checkStatus, 2000);
    };
</script>
</body>
</html>
